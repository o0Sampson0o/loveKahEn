<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>For You ❤️</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <!-- The "table": captures taps/drags; the world inside it pans like a camera -->
  <main id="table" class="table">
    <!-- Pannable surface; pop-ups (messages / images) get added here by JS -->
    <div id="world" class="world"></div>
  </main>

  <!-- Gentle hint shown before the first interaction -->
  <div id="hint" class="hint">tap anywhere</div>

  <script src="scripts/main.js"></script>
</body>
</html>
