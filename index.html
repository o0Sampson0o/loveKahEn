<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>For You ❤️</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <!-- The "table": a scrollable surface. Tap to throw, scroll to look around. -->
  <main id="table" class="table">
    <!-- The canvas pop-ups (messages / images) get scattered onto, by JS -->
    <div id="surface" class="surface"></div>
  </main>

  <!-- Gentle hint shown before the first interaction -->
  <div id="hint" class="hint">tap anywhere</div>

  <!-- Directional hint shown when a throw lands off-screen -->
  <div id="toss-hint" class="toss-hint"></div>

  <script src="scripts/main.js"></script>
</body>
</html>
