<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- Keep this private page out of search engines -->
  <meta name="robots" content="noindex, nofollow" />
  <title>For You ❤️</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <!-- The "table": a scrollable surface. Tap to throw, scroll to look around. -->
  <main id="table" class="table">
    <!-- The pop-ups (messages / images) get scattered onto this, by JS -->
    <div id="surface" class="surface"></div>
  </main>

  <!-- Opening splash: the fancy day-count cover, tap to begin -->
  <div id="intro" class="intro">
    <div class="intro-inner">
      <div class="intro-eyebrow">we've been together for</div>
      <div class="intro-count" id="intro-count">0</div>
      <div class="intro-label">days</div>
      <div class="intro-since" id="intro-since"></div>
      <div class="intro-cta">tap <span class="dot">❤️</span> to begin</div>
    </div>
  </div>

  <!-- Directional hint shown when a throw lands off-screen -->
  <div id="toss-hint" class="toss-hint"></div>

  <!-- Live count of memories revealed -->
  <div id="counter" class="counter">♡ 0</div>

  <!-- Music toggle -->
  <button id="music-toggle" class="music-toggle" type="button" aria-label="Toggle music">🔇</button>

  <!-- Background music. Playlist + sequencing handled in scripts/main.js -->
  <audio id="bgm" preload="auto"></audio>

  <script src="scripts/particles.js"></script>
  <script src="scripts/data.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
